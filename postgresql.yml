version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass123
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"  # เพิ่ม port สำหรับ external access
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db-network
      - main_public    # เพิ่ม network สำหรับ external access
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 1G

  # pgAdmin - Web UI สำหรับ PostgreSQL
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8082:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - db-network
      - main_public
    depends_on:
      - postgres
    deploy:
      replicas: 1
      restart_policy:
        condition: any

volumes:
  postgres_data:
  pgadmin_data:

networks:
  main_public:
    external: true
  db-network:
    driver: overlay
    # ลบ internal: true เพื่อให้ access ได้