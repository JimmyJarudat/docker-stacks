version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    command: mongod --wiredTigerCacheSizeGB 0.25 --quiet
    environment:
      MONGO_INITDB_ROOT_USERNAME: _
      MONGO_INITDB_ROOT_PASSWORD: your_password
      MONGO_INITDB_DATABASE: your_db_name
    volumes:
      - mongo_data:/data/db
    ports:
      - "45678:27017"
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

volumes:
  mongo_data:
    driver: local